name: OIDF Publish Prep
on:
  pull_request_review:
    types:
    - submitted

concurrency:
  group: publish-prep-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish_prep:
    name: OIDF-Publish-Prep
    if: github.event.review.state == 'APPROVED'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: read
    steps:
      - name: Check if already previewed
        id: already_previewed
        uses: actions/github-script@v8
        with:
          script: |
            const headSha = context.payload.pull_request.head.sha.substring(0, 7);
            let already = false;
            for await (const response of github.paginate.iterator(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, per_page: 100 }
            )) {
              if (response.data.some(c =>
                c.body.includes('📦 Publication Preview') && c.body.includes(headSha)
              )) { already = true; break; }
            }
            core.setOutput('skip', already.toString());
            if (already) core.info(`Preview already posted for ${headSha}`);

      - uses: actions/checkout@v6
        if: steps.already_previewed.outputs.skip != 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Checkout publication-checks
        if: steps.already_previewed.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: openid/publication-checks
          path: publication-scripts
          ssh-key: ${{ secrets.OPENID_PUBLICATION_DEPLOY_KEY }}

      - name: Set up Python
        if: steps.already_previewed.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python requirements
        if: steps.already_previewed.outputs.skip != 'true'
        run: |
          cd ./publication-scripts
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run publish prep
        if: steps.already_previewed.outputs.skip != 'true'
        id: prep
        run: |
          # Pass CHANGED_FILES the same way the publish workflow does,
          # so publish.py sees the same file list it will see after merge.
          export CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          mkdir ./to-publish
          cd ./publication-scripts
          python3 publish.py 2>&1 | tee "$RUNNER_TEMP/publish-output.txt"
          PUBLISH_EXIT=$?
          cd ..

          # Dry-run the copy and rm steps to verify they'd work
          if [ "$(ls -A to-publish/ 2>/dev/null)" ]; then
            # Check sync/specs exists
            if [ ! -d sync/specs ]; then
              echo "WARNING: sync/specs/ directory does not exist on this branch"
            fi
            # Check source files exist for removal
            echo "$CHANGED_FILES" | while read -r f; do
              if [ -n "$f" ] && [ ! -f "$f" ]; then
                echo "WARNING: Source file $f not found (may already be removed)"
              fi
            done
          fi

          HEAD_SHA=$(git rev-parse --short HEAD)
          SUMMARY="$RUNNER_TEMP/publish-summary.md"
          echo "## 📦 Publication Preview" > "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "_For commit ${HEAD_SHA}_" >> "$SUMMARY"
          echo "" >> "$SUMMARY"
          LOG_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$(ls -A to-publish/ 2>/dev/null)" ]; then
            echo "The following files will be published to \`sync/specs/\` when this PR is merged:" >> "$SUMMARY"
            echo "" >> "$SUMMARY"
            echo "| File | Size |" >> "$SUMMARY"
            echo "|------|------|" >> "$SUMMARY"
            for f in to-publish/*; do
              name=$(basename "$f")
              size=$(stat --printf="%s" "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo "?")
              echo "| \`$name\` | ${size} bytes |" >> "$SUMMARY"
            done
            echo "" >> "$SUMMARY"
            echo "### Published URLs" >> "$SUMMARY"
            echo "" >> "$SUMMARY"
            sed 's/\x1b\[[0-9;]*m//g' "$RUNNER_TEMP/publish-output.txt" | grep -oP 'https://openid\.net/specs/\S+' | sort -u | while read -r url; do
              echo "- \`$url\`" >> "$SUMMARY"
            done
            echo "" >> "$SUMMARY"
            echo "**To publish these files, merge this pull request.**" >> "$SUMMARY"
          else
            echo "No files were produced by publish.py." >> "$SUMMARY"
          fi
          echo "" >> "$SUMMARY"
          echo "See the [workflow log](${LOG_URL}) for details." >> "$SUMMARY"
        continue-on-error: true

      - name: Check approval permissions
        if: steps.already_previewed.outputs.skip != 'true'
        id: approval_check
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reviewer = context.payload.review.user.login;

            // Approvers list is read from main (NOT the PR branch) so that an
            // editor cannot add themselves to it in their own PR. See the
            // header of .github/SECRETARY_APPROVERS for why this is a file
            // rather than a GitHub team membership query.
            const approversPath = '.github/SECRETARY_APPROVERS';
            const approversRef = 'main';
            let approvers = [];
            let approversSha = '';
            try {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: approversPath,
                ref: approversRef,
              });
              approversSha = res.data.sha;
              approvers = Buffer.from(res.data.content, 'base64').toString('utf8')
                .split('\n')
                .map(l => l.replace(/#.*/, '').trim())
                .filter(Boolean);
            } catch (e) {
              core.setFailed(`Could not read ${approversPath} from ${approversRef}: ${e.message}`);
              return;
            }
            core.info(`Loaded ${approvers.length} secretary approver(s) from ${context.repo.owner}/${context.repo.repo}:${approversPath} @ ${approversRef} (blob ${approversSha}): ${approvers.join(', ')}`);
            const isSecretary = approvers.some(u => u.toLowerCase() === reviewer.toLowerCase());
            core.info(`Reviewer ${reviewer} is${isSecretary ? '' : ' not'} a secretary approver`);
            if (isSecretary) return;

            // Non-secretary: block Final/Errata/Implementers Draft
            let output = '';
            try {
              output = fs.readFileSync(`${process.env.RUNNER_TEMP}/publish-output.txt`, 'utf8')
                .replace(/\x1b\[[0-9;]*m/g, '');
            } catch (e) {
              core.setFailed('Could not read publish output');
              return;
            }
            const states = output.split('\n')
              .filter(l => l.trim().startsWith('Do '))
              .map(l => l.trim().replace('Do ', '').replace(/ copies.*/, '').trim());
            const needsSecretary = states.some(s =>
              ['FINAL', 'ERRATA', 'IMPLEMENTERS'].includes(s)
            );
            if (needsSecretary) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⛔ **Publication blocked.** This PR contains a Final, Errata, or Implementers Draft which requires approval from the secretary team. @${reviewer}'s approval is not sufficient for this publication type.\n\nPlease request a review from @openid/secretaryandteam.`
              });
              core.setFailed('Secretary approval required for Final/Errata/Implementers Draft');
              return;
            }

            // Non-secretary approving a draft: check that publication checks passed
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });
            const checkRun = checks.data.check_runs.find(
              c => c.name === 'Run automated checks on proposed OIDF specs'
            );
            if (!checkRun || checkRun.conclusion !== 'success') {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⛔ **Publication blocked.** Co-chair approval is only sufficient when all publication checks pass. The checks have not passed for this PR.\n\nEither fix the issues and re-run the checks, or request approval from @openid/secretaryandteam who can override.`
              });
              core.setFailed('Co-chair approval requires passing publication checks');
              return;
            }

      - name: Comment on PR
        if: always() && steps.already_previewed.outputs.skip != 'true' && steps.approval_check.outcome != 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summaryPath = `${process.env.RUNNER_TEMP}/publish-summary.md`;
            let body;
            try {
              body = fs.readFileSync(summaryPath, 'utf8');
            } catch (e) {
              body = '⚠️ Publish prep failed before generating a summary. Check the [workflow log](' +
                `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
